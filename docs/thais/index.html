<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Thais%20Louren%E7o · Relatórios Semanais · Endure.LabbS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0a0a0b;
      background-image:
        radial-gradient(at 12% -5%, rgba(124, 92, 255, 0.10) 0px, transparent 50%),
        radial-gradient(at 90% 0%, rgba(56, 189, 248, 0.07) 0px, transparent 50%),
        radial-gradient(at 50% 100%, rgba(168, 85, 247, 0.05) 0px, transparent 60%);
      background-attachment: fixed;
      color: #e5e5e5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(22, 22, 26, 0.55);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border-bottom: 1px solid #26262e;
    }
    .header-inner {
      max-width: 880px; margin: 0 auto; padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #7c5cff 0%, #a78bfa 100%);
      box-shadow: 0 0 0 1px rgba(124, 92, 255, 0.4), 0 0 20px rgba(124, 92, 255, 0.15);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 16px;
    }
    .brand-name { font-size: 14px; font-weight: 600; color: #f5f5f5; line-height: 1.1; }
    .brand-sub { font-size: 11px; color: #9ca3af; line-height: 1.2; margin-top: 2px; }

    .hero {
      max-width: 880px; margin: 0 auto; padding: 56px 24px 32px;
      display: flex; align-items: center; gap: 20px;
      animation: fadeUp .6s cubic-bezier(.16,1,.3,1);
    }
    .avatar {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #7c5cff 0%, #ec4899 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 22px; color: white;
      flex-shrink: 0;
      box-shadow: 0 8px 32px -8px rgba(124, 92, 255, 0.5);
    }
    .hero-text h1 {
      margin: 0; font-size: 36px; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #e5e7eb 50%, #6b7280 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }
    .hero-text p {
      margin: 8px 0 0; font-size: 14px; color: #9ca3af;
    }

    .reports-section { max-width: 880px; margin: 0 auto; padding: 16px 24px 48px; }
    .section-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: #6b7280; margin: 0 0 16px; font-weight: 600;
    }

    .report-list { display: flex; flex-direction: column; gap: 10px; }
    .report-card {
      position: relative;
      display: flex; align-items: center; gap: 16px;
      padding: 18px 20px;
      background: #16161a;
      border: 1px solid #26262e;
      border-radius: 14px;
      text-decoration: none; color: inherit;
      transition: all .2s cubic-bezier(.16,1,.3,1);
      opacity: 0;
      animation: fadeIn .5s cubic-bezier(.16,1,.3,1) forwards;
    }
    .report-card:hover {
      border-color: #36363f;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px -12px rgba(124, 92, 255, 0.3);
      background: #1a1a20;
    }
    .report-card:hover .report-arrow {
      transform: translateX(4px);
      color: #a78bfa;
    }
    .report-card--latest {
      border-color: rgba(124, 92, 255, 0.4);
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.08) 0%, #16161a 60%);
      box-shadow: 0 0 30px -10px rgba(124, 92, 255, 0.4);
    }
    .report-month {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: #9ca3af; font-weight: 600;
      min-width: 70px;
    }
    .report-range {
      flex: 1;
      font-size: 16px; font-weight: 500; color: #f5f5f5;
      letter-spacing: -0.01em;
    }
    .report-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      color: #c4b5fd;
      background: rgba(124, 92, 255, 0.15);
      border: 1px solid rgba(124, 92, 255, 0.3);
      padding: 4px 8px; border-radius: 6px;
      text-transform: uppercase;
    }
    .report-arrow {
      font-size: 18px; color: #6b7280;
      transition: all .2s cubic-bezier(.16,1,.3,1);
    }

    .empty {
      padding: 48px 24px; text-align: center;
      background: #16161a; border: 1px dashed #36363f; border-radius: 14px;
      color: #9ca3af;
    }

    .footer {
      border-top: 1px solid #26262e;
      max-width: 880px; margin: 0 auto;
      padding: 24px;
      font-size: 12px; color: #6b7280;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { to { opacity: 1; } }

    @media (max-width: 640px) {
      .hero { padding: 32px 20px 24px; gap: 16px; }
      .avatar { width: 52px; height: 52px; border-radius: 14px; font-size: 18px; }
      .hero-text h1 { font-size: 28px; }
      .report-card { padding: 16px; gap: 12px; }
      .report-month { min-width: 56px; font-size: 10px; }
      .report-range { font-size: 14px; }
      .footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
